<section id="proyectos" class="seccion">
    <h2 class="titulo-seccion">Contenido Académico por Semanas</h2>
    
    <div id="contenedorSemanas">
        <div class="semana-bloque">
            <div class="semana-info">
                <h3>Semana 1: Introducción a SQL</h3>
                <p>Aquí va la información o apuntes que escribirás sobre lo aprendido en la semana...</p>
            </div>
            
            <div class="tareas-grid">
                <div class="tarea-card">
                    <h4>Tarea 1</h4>
                    <div id="recursos-tarea1">
                        </div>
                </div>
                <div class="tarea-card">
                    <h4>Tarea 2</h4>
                    <div id="recursos-tarea2"></div>
                </div>
                <div class="tarea-card">
                    <h4>Tarea 3</h4>
                    <div id="recursos-tarea3"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<div id="admin">
    <div class="panel-header">
        <h2>Gestor de Contenido Semanal</h2>
        <button onclick="cerrar()">✖</button>
    </div>

    <div id="crear" class="tab">
        <div class="admin-group">
            <label>Selecciona Semana:</label>
            <select id="semanaActiva">
                <option value="1">Semana 1</option>
                <option value="2">Semana 2</option>
                <option value="3">Semana 3</option>
            </select>
            <textarea id="infoSemana" placeholder="Escribe aquí la información o teoría de la semana..."></textarea>
        </div>

        <hr>

        <div class="admin-group">
            <label>Selecciona Tarea:</label>
            <select id="tareaActiva">
                <option value="1">Tarea 1</option>
                <option value="2">Tarea 2</option>
                <option value="3">Tarea 3</option>
            </select>
            
            <input type="text" id="linkCanva" placeholder="Pega aquí link de Canva o Drive">
            <label>O sube un archivo local:</label>
            <input type="file" id="archivoTarea">
        </div>

        <button class="btn-guardar" onclick="publicarContenido()">Actualizar Semana / Tarea</button>
    </div>
</div>
